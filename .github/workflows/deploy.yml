# ============================================================
# Quantum MCP Relayer — Deploy to Production
# ============================================================

name: Deploy

on:
  push:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: deploy-production
  cancel-in-progress: false

jobs:
  deploy:
    name: Deploy to production
    runs-on: ubuntu-latest
    environment: production
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to container registry
        uses: docker/login-action@v3
        with:
          registry: ${{ vars.REGISTRY_URL }}
          username: ${{ secrets.REGISTRY_USERNAME }}
          password: ${{ secrets.REGISTRY_PASSWORD }}

      - name: Build and push image
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: |
            ${{ vars.REGISTRY_URL }}/quantum-mcp-relayer:${{ github.sha }}
            ${{ vars.REGISTRY_URL }}/quantum-mcp-relayer:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.DEPLOY_HOST }}
          username: ${{ secrets.DEPLOY_USER }}
          key: ${{ secrets.DEPLOY_SSH_KEY }}
          script: |
            set -euo pipefail
            cd ${{ vars.DEPLOY_PATH }}

            # Pull the new image
            docker compose pull api

            # Rolling restart — bring up new containers before stopping old ones
            docker compose -f docker-compose.yml -f docker-compose.production.yml up -d --remove-orphans

            # Prune dangling images to reclaim disk
            docker image prune -f

      - name: Health check after deploy
        env:
          DEPLOY_URL: ${{ vars.DEPLOY_URL }}
        run: |
          echo "Waiting for service to become healthy..."
          for i in $(seq 1 12); do
            STATUS=$(curl -sf "${DEPLOY_URL}/health" | python3 -c "import sys,json; print(json.load(sys.stdin).get('status',''))" 2>/dev/null || true)
            if [ "$STATUS" = "ok" ]; then
              echo "Health check passed on attempt $i"
              exit 0
            fi
            echo "Attempt $i/12 — not healthy yet, waiting 10s..."
            sleep 10
          done
          echo "Health check failed after 2 minutes"
          exit 1

      - name: Notify on failure
        if: failure()
        run: |
          echo "::error::Deployment failed — check logs and consider rollback"
          echo "Rollback command: ssh ${{ secrets.DEPLOY_USER }}@${{ secrets.DEPLOY_HOST }} 'cd ${{ vars.DEPLOY_PATH }} && docker compose pull api && docker compose up -d'"
